<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="100%" height="80">
  <style>
    .greeting {
      font-family: 'Fira Code', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 24px;
      font-weight: 700;
      fill: #8a8a8a;
      opacity: 0;
      animation: fade-loop 30s infinite ease-in-out;
    }
    
    .g1 { animation-delay: 0s; }
    .g2 { animation-delay: 2s; }
    .g3 { animation-delay: 4s; }
    .g4 { animation-delay: 6s; }
    .g5 { animation-delay: 8s; }
    .g6 { animation-delay: 10s; }
    .g7 { animation-delay: 12s; }
    .g8 { animation-delay: 14s; }
    .g9 { animation-delay: 16s; }
    .g10 { animation-delay: 18s; }
    .g11 { animation-delay: 20s; }
    .g12 { animation-delay: 22s; }
    .g13 { animation-delay: 24s; }
    .g14 { animation-delay: 26s; }
    .g15 { animation-delay: 28s; }

    @keyframes fade-loop {
      0% { opacity: 0; transform: translateY(6px); }
      1.5% { opacity: 1; transform: translateY(0); }
      5.5% { opacity: 1; transform: translateY(0); }
      7% { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 0; }
    }
  </style>
  <g dominant-baseline="middle" text-anchor="middle">
    <text x="50%" y="50%" class="greeting g1">안녕하세요.</text>
    <text x="50%" y="50%" class="greeting g2">Hello.</text>
    <text x="50%" y="50%" class="greeting g3">こんにちは。</text>
    <text x="50%" y="50%" class="greeting g4">你好。</text>
    <text x="50%" y="50%" class="greeting g5">مرحبا.</text>
    <text x="50%" y="50%" class="greeting g6">नमस्ते.</text>
    <text x="50%" y="50%" class="greeting g7">Bonjour.</text>
    <text x="50%" y="50%" class="greeting g8">Hola.</text>
    <text x="50%" y="50%" class="greeting g9">Hallo.</text>
    <text x="50%" y="50%" class="greeting g10">Ciao.</text>
    <text x="50%" y="50%" class="greeting g11">Привет.</text>
    <text x="50%" y="50%" class="greeting g12">Xin chào.</text>
    <text x="50%" y="50%" class="greeting g13">สวัสดี.</text>
    <text x="50%" y="50%" class="greeting g14">Γεια σας.</text>
    <text x="50%" y="50%" class="greeting g15">שלום.</text>
  </g>
</svg>
