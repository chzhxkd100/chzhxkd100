<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" width="100%" height="80">
  <style>
    .greeting {
      font-family: 'Fira Code', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 26px;
      font-weight: 800;
      fill: #00f0ff;
      opacity: 0;
      animation: fade-loop 18s infinite ease-in-out;
    }
    
    .g1 { animation-delay: 0s; }
    .g2 { animation-delay: 3s; }
    .g3 { animation-delay: 6s; }
    .g4 { animation-delay: 9s; }
    .g5 { animation-delay: 12s; }
    .g6 { animation-delay: 15s; }

    @keyframes fade-loop {
      0% { opacity: 0; transform: translateY(8px); filter: blur(2px); }
      4% { opacity: 1; transform: translateY(0); filter: blur(0); }
      13% { opacity: 1; transform: translateY(0); filter: blur(0); }
      17% { opacity: 0; transform: translateY(-8px); filter: blur(2px); }
      100% { opacity: 0; }
    }
  </style>
  <g dominant-baseline="middle" text-anchor="middle">
    <text x="50%" y="50%" class="greeting g1">안녕하세요.</text>
    <text x="50%" y="50%" class="greeting g2">Hello.</text>
    <text x="50%" y="50%" class="greeting g3">こんにちは。</text>
    <text x="50%" y="50%" class="greeting g4">你好。</text>
    <text x="50%" y="50%" class="greeting g5">مرحبا.</text>
    <text x="50%" y="50%" class="greeting g6">नमस्ते.</text>
  </g>
</svg>
